<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Família GC</title>
</head>
<body>
  

<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Barlow:wght@400;500;600&display=swap');

  html, body {
  margin: 0;
  padding: 0;
}
  .gc-wrap {
    background: #0f0f14;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .gc-bg-glow {
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(139,92,246,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .gc-logo-badge {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border-radius: 50%;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 1rem;
    box-shadow: 0 0 24px rgba(139,92,246,0.5);
    letter-spacing: 1px;
  }

  .gc-welcome {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #a855f7;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .gc-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  .gc-title span {
    color: #c084fc;
  }

  .gc-subtitle {
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 2rem;
  }

  .gc-cards {
    display: flex;
    gap: 20px;
    margin-bottom: 2rem;
    width: 100%;
    max-width: 500px;
  }

  .gc-card {
    flex: 1;
    background: #18181f;
    border: 1px solid #2a2a38;
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .gc-card-img {
    width: 100%;
    height: 90px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    position: relative;
    overflow: hidden;
  }

  .gc-card-img.teams {
    background: linear-gradient(135deg, #1e1b3a 0%, #2d1f4a 100%);
  }

  .gc-card-img.maps {
    background: linear-gradient(135deg, #0d2a1e 0%, #1a3d2b 100%);
  }

  .gc-card-label {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6b7280;
  }

  .gc-btn {
    width: 100%;
    padding: 10px 0;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform 0.1s, box-shadow 0.2s;
  }

  .gc-btn:active { transform: scale(0.97); }

  .gc-btn.teams {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: #fff;
    box-shadow: 0 4px 16px rgba(139,92,246,0.35);
  }

  .gc-btn.teams:hover {
    box-shadow: 0 4px 24px rgba(139,92,246,0.55);
  }

  .gc-btn.maps {
    background: linear-gradient(135deg, #065f46, #10b981);
    color: #fff;
    box-shadow: 0 4px 16px rgba(16,185,129,0.3);
  }

  .gc-btn.maps:hover {
    box-shadow: 0 4px 24px rgba(16,185,129,0.5);
  }

  .gc-divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a38, transparent);
    margin-bottom: 1.5rem;
  }

  .gc-discord-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #5865F2;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.1s;
  }

  .gc-discord-btn:hover { background: #4752C4; }
  .gc-discord-btn:active { transform: scale(0.97); }

  .gc-discord-btn svg {
    width: 20px;
    height: 20px;
    fill: #fff;
    flex-shrink: 0;
  }

  /* Floating particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: float linear infinite;
    opacity: 0.15;
  }

  @keyframes float {
    from { transform: translateY(0px) rotate(0deg); opacity: 0.1; }
    50% { opacity: 0.2; }
    to { transform: translateY(-400px) rotate(360deg); opacity: 0; }
  }

  /* Crossed swords SVG illustration */
  .sword-icon {
    width: 48px;
    height: 48px;
    opacity: 0.9;
  }

  .map-icon {
    width: 48px;
    height: 48px;
    opacity: 0.9;
  }
</style>

<div class="gc-wrap">
  <div class="gc-bg-glow"></div>

  <!-- particles -->
  <div class="particle" style="width:4px;height:4px;background:#a855f7;left:15%;top:80%;animation-duration:8s;animation-delay:0s;"></div>
  <div class="particle" style="width:3px;height:3px;background:#7c3aed;left:30%;top:90%;animation-duration:10s;animation-delay:2s;"></div>
  <div class="particle" style="width:5px;height:5px;background:#c084fc;left:70%;top:85%;animation-duration:7s;animation-delay:1s;"></div>
  <div class="particle" style="width:3px;height:3px;background:#10b981;left:80%;top:88%;animation-duration:9s;animation-delay:3s;"></div>
  <div class="particle" style="width:4px;height:4px;background:#818cf8;left:50%;top:92%;animation-duration:11s;animation-delay:0.5s;"></div>

  <div class="gc-logo-badge">GC</div>

  <p class="gc-welcome">Bem-vindo ao</p>
  <h1 class="gc-title">Mix da <span>Família GC</span></h1>
  <p class="gc-subtitle">Escolha uma opção para começar</p>

  <div class="gc-cards">
    <!-- Sortear Times -->
    <div class="gc-card">
      <p class="gc-card-label">Times</p>
      <div class="gc-card-img teams">
        <svg class="sword-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <g opacity="0.95">
            <!-- Sword 1 (top-left to bottom-right) -->
            <line x1="10" y1="10" x2="54" y2="54" stroke="#c084fc" stroke-width="3" stroke-linecap="round"/>
            <polygon points="10,10 14,18 18,14" fill="#a855f7"/>
            <rect x="27" y="36" width="10" height="3" rx="1.5" fill="#7c3aed" transform="rotate(45 32 37.5)"/>
            <!-- Sword 2 (top-right to bottom-left) -->
            <line x1="54" y1="10" x2="10" y2="54" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
            <polygon points="54,10 50,18 46,14" fill="#6366f1"/>
            <rect x="27" y="24" width="10" height="3" rx="1.5" fill="#7c3aed" transform="rotate(-45 32 25.5)"/>
            <!-- center glow dot -->
            <circle cx="32" cy="32" r="4" fill="#c084fc" opacity="0.8"/>
          </g>
        </svg>
      </div>
      <button class="gc-btn teams" onclick="window.location.href='/sorteio.php'"> ⚡ Sortear Times</button>
    </div>

    <!-- Sortear Mapas -->
    <div class="gc-card">
      <p class="gc-card-label">Mapas</p>
      <div class="gc-card-img maps">
        <svg class="map-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <!-- Map shape -->
          <polygon points="6,10 22,6 42,12 58,8 58,54 42,58 22,52 6,56" fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
          <!-- Fold lines -->
          <line x1="22" y1="6" x2="22" y2="52" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
          <line x1="42" y1="12" x2="42" y2="58" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
          <!-- Location pin -->
          <circle cx="32" cy="28" r="6" fill="#065f46" stroke="#10b981" stroke-width="2"/>
          <circle cx="32" cy="28" r="2.5" fill="#10b981"/>
          <line x1="32" y1="34" x2="32" y2="40" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <button class="gc-btn maps" onclick="window.location.href='/sorteio_de_mapas.html'">🗺️ Sortear Mapas</button>
    </div>
  </div>

  <div class="gc-divider"></div>

  <!-- Discord Button -->
  <button class="gc-discord-btn" onclick="openLink('https://discord.gg/familiagc')">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.083.115 18.108.136 18.123a19.916 19.916 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </svg>
    Entrar no servidor da Família GC
  </button>
</div>
</body>
</html>
